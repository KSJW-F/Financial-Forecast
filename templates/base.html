<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI 金融报告分析系统{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark app-navbar mb-4 py-3">
    <div class="container">
      <span class="navbar-brand mb-0">AI 金融报告分析 · 市场走势</span>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-light nav-pill {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">研报列表</a>
        <a class="btn btn-outline-light nav-pill {% if request.endpoint == 'insights' %}active{% endif %}" href="{{ url_for('insights') }}">决策参考</a>
        <a class="btn btn-light nav-pill {% if request.endpoint == 'charts' %}active{% endif %}" href="{{ url_for('charts') }}">趋势图表</a>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
